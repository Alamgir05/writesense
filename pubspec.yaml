name: writesense
description: "WriteSense — Handwriting Irregularity Detection App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Image capture & processing
  image_picker: ^1.1.2
  image: ^4.2.0

  # Local persistence (kept for offline fallback)
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4

  # File system
  path_provider: ^2.1.3
  path: ^1.9.0

  # PDF generation & sharing
  pdf: ^3.11.1
  printing: ^5.13.1

  # Charts
  fl_chart: ^0.69.0

  # CSV export
  csv: ^6.0.0

  # Sharing files
  share_plus: ^10.0.2

  # Unique IDs
  uuid: ^4.4.2

  # Date formatting
  intl: ^0.19.0

  # Typography
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
